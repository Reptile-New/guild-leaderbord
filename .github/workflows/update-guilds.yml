# Importe toutes les guildes du classement serveur et le top des personnages
# (API publique du jeu) dans data/guilds.json et data/players.json. Les champs
# éditoriaux des guildes (motto, site, langue…) restent gérés par issues/PR —
# les scripts ne les touchent jamais.
name: Sync des guildes (API du jeu)

on:
  schedule:
    - cron: "23 */3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/sync_guilds.py"
      - "scripts/sync_players.py"
      - ".github/workflows/update-guilds.yml"

permissions:
  contents: write
  actions: write   # pour relancer le déploiement Pages après le commit

concurrency:
  group: guilds-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Relever le classement des guildes
        run: python3 scripts/sync_guilds.py

      - name: Relever le classement des personnages
        run: python3 scripts/sync_players.py

      - name: Commit & redéploiement si changement
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet data/guilds.json data/players.json && [ -f data/players.json ]; then
            echo "Aucun changement."
            exit 0
          fi
          git config user.name "boards-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/guilds.json data/players.json
          git commit -m "guildes : sync depuis l'API du jeu"
          pushed=false
          for i in 1 2 3 4; do
            if git push; then pushed=true; break; fi
            echo "push échoué, rebase et nouvelle tentative ($i)…"
            git pull --rebase origin main
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Impossible de pousser après 4 tentatives."
            exit 1
          fi
          # Un push fait avec le GITHUB_TOKEN ne déclenche pas « on: push » —
          # on relance donc la publication explicitement.
          gh workflow run deploy-pages.yml --ref main
