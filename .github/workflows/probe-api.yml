# Sonde TEMPORAIRE v2 : le champ "scope":"realm" du leaderboard suggère un
# scope=guild — si ça répond, on a la liste des membres par guilde. À supprimer.
name: Sonde API (temporaire)

on:
  push:
    branches: [main]
    paths: [".github/workflows/probe-api.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Sonder les variantes scope/guild
        run: |
          BASE="https://worldofclaudecraft.com"
          UA="wocc-guild-boards/1.0 (+https://github.com/Reptile-New/guild-leaderbord)"
          probe() {
            echo "=================================================================="
            echo "GET $1"
            curl -s -m 15 -w "\n--- HTTP %{http_code}\n" -H "User-Agent: $UA" -H "Accept: application/json" "$BASE$1" | head -c 1500
            echo
          }
          probe "/api/leaderboard?scope=guild&guild=La%20Clauderie&pageSize=50"
          probe "/api/leaderboard?scope=guild&guildName=La%20Clauderie&pageSize=50"
          probe "/api/leaderboard?scope=guild&name=La%20Clauderie&pageSize=5"
          probe "/api/leaderboard?guild=La%20Clauderie&pageSize=50"
          probe "/api/leaderboard?guildName=La%20Clauderie&pageSize=5"
          probe "/api/leaderboard?scope=guild&pageSize=5"
          probe "/api/who?name=Faceless"
          probe "/api/profile?name=Faceless"
          probe "/api/character?name=Faceless"
          probe "/api/armory/Faceless"
          probe "/api/inspect?name=Faceless"
          echo "=================================================================="
          echo "pageSize=100 : la réponse contient-elle un champ guild* ?"
          curl -s -m 15 -H "User-Agent: $UA" "$BASE/api/leaderboard?page=0&pageSize=100" | grep -oiE '"guild[^"]*"' | sort | uniq -c || echo "aucun champ guild dans les entrées personnages"
