# Sonde TEMPORAIRE de l'API du jeu : liste les endpoints qui répondent et un
# extrait de leur réponse, pour savoir quelles données publiques existent
# (membres de guilde, personnages, comptes…). À supprimer une fois l'API cartographiée.
name: Sonde API (temporaire)

on:
  push:
    branches: [main]
    paths: [".github/workflows/probe-api.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Sonder les endpoints candidats
        run: |
          BASE="https://worldofclaudecraft.com"
          UA="wocc-guild-boards/1.0 (+https://github.com/Reptile-New/guild-leaderbord)"
          probe() {
            echo "=================================================================="
            echo "GET $1"
            curl -s -m 15 -w "\n--- HTTP %{http_code}\n" -H "User-Agent: $UA" -H "Accept: application/json" "$BASE$1" | head -c 1200
            echo
          }
          probe "/api"
          probe "/api/leaderboard"
          probe "/api/leaderboard?board=bogus&page=0&pageSize=5"
          probe "/api/leaderboard?board=players&page=0&pageSize=5"
          probe "/api/leaderboard?board=characters&page=0&pageSize=5"
          probe "/api/leaderboard?board=xp&page=0&pageSize=5"
          probe "/api/leaderboard?board=level&page=0&pageSize=5"
          probe "/api/leaderboard?board=honor&page=0&pageSize=5"
          probe "/api/leaderboard?board=guilds&page=0&pageSize=2"
          probe "/api/guilds"
          probe "/api/guilds/la-clauderie"
          probe "/api/guilds/la-clauderie/members"
          probe "/api/guild?name=La%20Clauderie"
          probe "/api/guild/La%20Clauderie"
          probe "/api/guild/La%20Clauderie/members"
          probe "/api/members?guild=La%20Clauderie"
          probe "/api/characters?guild=La%20Clauderie"
          probe "/api/players?guild=La%20Clauderie"
          probe "/api/character/Yumiko"
          probe "/api/players"
