name: "🏟️ Tournoi (inscription ou résultats)"
description: "Inscrire une équipe à un tournoi ouvert, proposer un tournoi, ou soumettre des résultats — data/tournaments.json"
title: "[Tournoi] "
labels: ["tournoi"]
body:
  - type: dropdown
    id: type
    attributes:
      label: "Objet"
      options:
        - "Inscrire mon équipe à un tournoi ouvert"
        - "Proposer / organiser un nouveau tournoi"
        - "Soumettre les résultats d'un tournoi terminé"
    validations:
      required: true
  - type: input
    id: tournoi
    attributes:
      label: "Tournoi concerné (nom ou id, ex. protect-yumi-invitational-aout-2026)"
    validations:
      required: true
  - type: input
    id: guilde
    attributes:
      label: "Guilde"
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: "Format (si nouveau tournoi)"
      options:
        - "Élimination directe (single elim)"
        - "Double élimination"
        - "Poules (round robin)"
        - "Système suisse"
  - type: dropdown
    id: mode
    attributes:
      label: "Mode de jeu (si nouveau tournoi)"
      options: ["1v1", "2v2", "Protect Yumi 3v3", "Protect Yumi 5v5", "Fiesta", "Autre"]
  - type: textarea
    id: details
    attributes:
      label: "Détails"
      description: "Équipe et joueurs pour une inscription ; date, règles et cash/lot éventuel pour une proposition ; arbre complet des scores pour des résultats (l'organisateur peut aussi ouvrir une PR sur data/tournaments.json)."
    validations:
      required: true
